# ============================================
# ARABIANKHALTA.COM - NGINX CONFIGURATION
# Landing-page-only domain for Arabian Khalta
# Proxies to TrustCart frontend (localhost:3000)
# Root URL -> /lp/arabiankhalta via Next.js middleware
# ============================================

# FRONTEND (Arabian Khalta Landing Page)
server {
    listen 443 ssl;
    server_name arabiankhalta.com www.arabiankhalta.com;

    ssl_certificate     /etc/letsencrypt/live/arabiankhalta.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arabiankhalta.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# HTTP -> HTTPS REDIRECT
server {
    listen 80;
    server_name arabiankhalta.com www.arabiankhalta.com;
    return 301 https://$host$request_uri;
}
