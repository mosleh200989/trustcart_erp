# ============================================
# KASRIOIL.COM - NGINX CONFIGURATION
# Landing-page-only domain for Kasri
# Proxies to TrustCart frontend (localhost:3000)
# Root URL -> landing page ID 25 via Next.js middleware
# ============================================

# FRONTEND (Kasri Landing Page)
server {
    listen 443 ssl;
    server_name kasrioil.com www.kasrioil.com;

    ssl_certificate     /etc/letsencrypt/live/kasrioil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kasrioil.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# HTTP -> HTTPS REDIRECT
server {
    listen 80;
    server_name kasrioil.com www.kasrioil.com;
    return 301 https://$host$request_uri;
}
