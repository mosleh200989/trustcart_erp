# ============================================
# HERBOLIN.COM - NGINX CONFIGURATION
# Landing-page-only domain
# Proxies to TrustCart frontend (localhost:3000)
# Root URL → /lp/Harbora-kosthogut landing page
# Backend  → localhost:3001 (shared multi-tenant backend)
# CORS handled by NestJS backend (not nginx)
# ============================================

# ── FRONTEND (Landing Page) ────────────────
server {
    listen 443 ssl;
    server_name herbolin.com www.herbolin.com;

    ssl_certificate     /etc/letsencrypt/live/herbolin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/herbolin.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Root URL → Landing Page ────────────
    location = / {
        rewrite ^ /lp/Harbora-kosthogut break;
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }

    # ── All other paths (assets, _next, api, etc.) ─
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# ── BACKEND API ────────────────────────────
server {
    listen 443 ssl;
    server_name api.herbolin.com;

    ssl_certificate     /etc/letsencrypt/live/herbolin.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/herbolin.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}

# ── HTTP → HTTPS REDIRECT (Frontend) ──────
server {
    listen 80;
    server_name herbolin.com www.herbolin.com;
    return 301 https://$host$request_uri;
}

# ── HTTP → HTTPS REDIRECT (Backend) ───────
server {
    listen 80;
    server_name api.herbolin.com;
    return 301 https://$host$request_uri;
}
