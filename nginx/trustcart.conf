# ============================================
# TRUSTCART / TRUSTKERT - NGINX CONFIGURATION
# Frontend → localhost:3000
# Backend  → localhost:3001
# CORS handled by NestJS backend (not nginx)
# ============================================

# ── FRONTEND ───────────────────────────────
server {
    listen 443 ssl;
    server_name trustkert.com www.trustkert.com trustcart.com.bd www.trustcart.com.bd shop.trustcart.com.bd;

    ssl_certificate     /etc/letsencrypt/live/trustkert.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trustkert.com-0001/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # Forwarded client info
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# ── BACKEND API ────────────────────────────
server {
    listen 443 ssl;
    server_name api.trustkert.com;

    ssl_certificate     /etc/letsencrypt/live/trustkert.com-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/trustkert.com-0001/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Allow larger request bodies (file uploads etc.)
    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        # Forwarded client info
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (longer for API operations)
        proxy_connect_timeout 60s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }
}

# ── HTTP → HTTPS REDIRECT (Frontend) ──────
server {
    listen 80;
    server_name trustkert.com www.trustkert.com trustcart.com.bd www.trustcart.com.bd shop.trustcart.com.bd;
    return 301 https://$host$request_uri;
}

# ── HTTP → HTTPS REDIRECT (Backend) ───────
server {
    listen 80;
    server_name api.trustkert.com;
    return 301 https://$host$request_uri;
}
