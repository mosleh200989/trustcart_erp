# ============================================
# VESHOJ.SITE - NGINX CONFIGURATION
# Landing-page-only domain for Veshoj
# Proxies to TrustCart frontend (localhost:3000)
# Root URL -> /lp/veshoj via Next.js middleware
# Backend -> localhost:3001 (shared TrustCart backend)
# ============================================

# FRONTEND (Veshoj Landing Page)
server {
    listen 443 ssl;
    server_name veshoj.site www.veshoj.site;

    ssl_certificate     /etc/letsencrypt/live/veshoj.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/veshoj.site/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# HTTP -> HTTPS REDIRECT
server {
    listen 80;
    server_name veshoj.site www.veshoj.site;
    return 301 https://$host$request_uri;
}
